<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="top">
        <h1>Pathfinder</h1>
        <div id="gridContainer">
            <table id="grid"></table>
        </div>
    </div>
    <div id="utilities">
        <button id="starting">Place Starting Block</button>
        <br><br>
        <button id="ending">Place Ending Block</button>
        <br><br>
        <input id="width" placeholder="Enter width MAX 100">
        <br><br>
        <input id="height" placeholder="Enter height MAX 100">
        <br><br>
        <button id="obstacle">Place Obstacles</button>
        <br><br>
        <button id="draw">Draw Grid</button>
        <br><br>
        <button id="reset">Reset</button>
        <br><br>
        <button id="start">Start BFS</button>
    </div>
</body>
</html>
